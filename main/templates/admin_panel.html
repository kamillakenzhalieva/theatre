{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления | Новый Стиль</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    
    <style>
        :root {
            --mint: #a8e6cf;
            --dark: #1a1a1a;
            --gray: #f9f9f9;
            --pink: #ff8b94;
            --blue: #a2d2ff;
            --yellow: #ffd93d;
        }

        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: var(--gray); overflow: hidden; }

        .sidebar { width: 280px; background: white; border-right: 2px solid var(--mint); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 18px; text-transform: uppercase; color: var(--dark); border-bottom: 2px solid var(--mint); padding-bottom: 15px; margin-bottom: 20px; }
        .nav-btn { padding: 15px; margin-bottom: 10px; border: none; background: none; text-align: left; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-btn:hover, .nav-btn.active { background: var(--mint); color: var(--dark); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .admin-table { width: 100%; background: white; border-radius: 20px; border-collapse: collapse; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .admin-table th { background: var(--mint); padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        .admin-table td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background: #f0fdf4; }

        .btn { padding: 10px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-add { background: var(--mint); color: var(--dark); font-size: 14px; }
        .btn-status { background: var(--yellow); color: var(--dark); min-width: 120px; }
        .btn-close-del { background: #eee; color: #666; width: 30px; height: 30px; border-radius: 50%; padding: 0; font-size: 18px; }
        .btn-close-del:hover { background: var(--pink); color: white; }
        
        .btn-approve { background: #2ec4b6; color: white; }
        .btn-edit-alt { background: var(--blue); color: var(--dark); }
        .btn-reply { background: var(--blue); color: var(--dark); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-card { background: white; width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; position: relative; }
        
        .details-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        .detail-item label { font-size: 11px; text-transform: uppercase; color: #888; display: block; margin-bottom: 2px; }
        .detail-item span { font-size: 15px; font-weight: 500; color: var(--dark); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        
        #calendar { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Админ-панель</h2>
    <button class="nav-btn active" onclick="loadSection('events', this)">🎭 Спектакли</button>
    <button class="nav-btn" onclick="loadSection('tariffs', this)">💰 Тарифы</button>
    <button class="nav-btn" onclick="loadSection('entertainment', this)">🔥 Шоу и Программы</button>
    <button class="nav-btn" onclick="loadSection('applications', this)">📩 Заявки</button>
    <button class="nav-btn" onclick="loadSection('home', this)">🏠 Инфо и Контакты</button>
    <button class="nav-btn" onclick="loadSection('calendar', this)">📅 Календарь</button>
    <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <a href="{% url 'home' %}" style="text-decoration: none; color: #666; font-size: 14px; padding: 10px;">← На сайт</a>
</div>

<div class="main-content">
    <div class="header-actions">
        <h1 id="section-title">Спектакли</h1>
        <button class="btn btn-add" id="add-btn" onclick="openCreateModal()">+ Добавить запись</button>
    </div>
    <div id="content-area"></div>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-card">
        <h2 id="modal-title">Редактирование</h2>
        <form id="admin-form">
            {% csrf_token %}
            <input type="hidden" name="id" id="field-id">
            <div id="form-fields"></div>
            <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal()" style="background: #eee;">Отмена</button>
                <button type="submit" class="btn btn-add">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<div id="app-details-overlay" class="modal-overlay">
    <div class="modal-card">
        <h2>Детали заявки</h2>
        <div id="app-details-content" class="details-grid"></div>
        <div style="margin-top: 25px; display: flex; justify-content: space-between; gap: 10px; border-top: 1px solid #eee; padding-top: 20px;">
            <div style="display: flex; gap: 10px;">
                <button type="button" id="btn-app-approve" class="btn btn-approve">Одобрить</button>
                <button type="button" id="btn-app-edit" class="btn btn-edit-alt">Изменить</button>
                <button type="button" id="btn-app-reply" class="btn btn-reply">Ответить</button>
            </div>
            <button type="button" class="btn" onclick="closeDetailsModal()" style="background: #eee;">Закрыть</button>
        </div>
    </div>
</div>

<script>
    let currentSection = 'events';
    let globalTariffs = [];
    let globalEntertainment = [];

    const schema = {
        'events': [
            { name: 'title', label: 'Название спектакля', type: 'text' },
            { name: 'image', label: 'Обложка (картинка)', type: 'file' },
            { name: 'price', label: 'Цена от', type: 'number' },
            { name: 'date', label: 'Дата и время', type: 'text' },
            { name: 'location', label: 'Локация', type: 'text' },
            { name: 'short_description', label: 'Краткое описание', type: 'text' },
            { name: 'description', label: 'Полное описание', type: 'textarea' }
        ],
        'tariffs': [
            { name: 'category', label: 'Категория', type: 'select', options: [{value:'birthday', label:'День рождения'}, {value:'graduation', label:'Выпускной'}, {value:'spectacle', label:'Спектакль'}]},
            { name: 'name', label: 'Имя тарифа', type: 'text' },
            { name: 'duration', label: 'Длительность', type: 'text' },
            { name: 'price', label: 'Цена', type: 'number' },
            { name: 'image', label: 'Фото тарифа', type: 'file' },
            { name: 'features_list', label: 'Список услуг (через Enter)', type: 'textarea' }
        ],
        'entertainment': [
            { name: 'category', label: 'Тип', type: 'select', options: [{value:'show', label:'Шоу-программа'}, {value:'program', label:'Программа'}]},
            { name: 'title', label: 'Название', type: 'text' },
            { name: 'description', label: 'Описание', type: 'textarea' },
            { name: 'image', label: 'Картинка', type: 'file' }
        ],
        'home': [
            { name: 'welcome_text', label: 'Заголовок на главной', type: 'text' },
            { name: 'subtitle', label: 'Подзаголовок', type: 'text' },
            { name: 'phone', label: 'Телефон', type: 'text' },
            { name: 'address', label: 'Адрес', type: 'text' },
            { name: 'email', label: 'Email', type: 'text' },
            { name: 'birthday_info', label: 'Общая инфо под тарифами (ДР)', type: 'textarea' }
        ],
        'applications': [
            { name: 'full_name', label: 'ФИО клиента', type: 'text' },
            { name: 'phone', label: 'Телефон', type: 'text' },
            { name: 'event_date', label: 'Дата события', type: 'date' },
            { name: 'guests_count', label: 'Кол-во гостей', type: 'number' },
            { name: 'tariff', label: 'Тариф', type: 'select_dynamic', source: 'tariffs' },
            { name: 'entertainment', label: 'Шоу/Программа', type: 'select_dynamic', source: 'entertainment' },
            { name: 'message', label: 'Комментарий', type: 'textarea' },
            { name: 'status', label: 'Статус', type: 'select', options: [
                {value:'pending', label:'Новая заявка'}, 
                {value:'processing', label:'На рассмотрении'}, 
                {value:'approved', label:'Одобрено'},
                {value:'rejected', label:'Отклонено'}
            ]}
        ]
    };

    async function loadLookups() {
        try {
            const [tResp, eResp] = await Promise.all([
                fetch('/api/tariffs/'),
                fetch('/api/entertainment/')
            ]);
            globalTariffs = await tResp.json();
            globalEntertainment = await eResp.json();
            if (globalTariffs.results) globalTariffs = globalTariffs.results;
            if (globalEntertainment.results) globalEntertainment = globalEntertainment.results;
        } catch (e) { console.error("Lookup load failed", e); }
    }

    async function loadSection(section, btn) {
        currentSection = section;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');

        const titleEl = document.getElementById('section-title');
        const addBtn = document.getElementById('add-btn');
        const titles = { 'events':'🎭 Спектакли', 'tariffs':'💰 Тарифы', 'entertainment':'🔥 Шоу и Программы', 'applications':'📩 Заявки', 'home':'🏠 Инфо и Контакты', 'calendar':'📅 Календарь' };
        
        titleEl.innerText = titles[section];
        addBtn.style.display = (['events', 'tariffs', 'entertainment'].includes(section)) ? 'block' : 'none';

        if (section === 'calendar') {
            document.getElementById('content-area').innerHTML = '<div id="calendar"></div>';
            new FullCalendar.Calendar(document.getElementById('calendar'), {
                locale: 'ru',
                events: '/api/calendar-data/',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' }
            }).render();
            return;
        }

        document.getElementById('content-area').innerHTML = '<p>Загрузка данных...</p>';
        try {
            const response = await fetch(`/api/${section}/`);
            const data = await response.json();
            if (section === 'home') renderHomeView(data);
            else renderTableView(data);
        } catch (e) {
            document.getElementById('content-area').innerHTML = '<p>Ошибка связи с сервером</p>';
        }
    }

    function renderTableView(data) {
        const area = document.getElementById('content-area');
        let items = Array.isArray(data) ? data : (data.results ? data.results : []);
        
        if (currentSection === 'applications') {
            items = items.filter(item => item.status !== 'approved' && item.status !== 'rejected');
        }

        if (items.length === 0) { area.innerHTML = '<p>Нет данных</p>'; return; }

        let keys = currentSection === 'applications' ? ['id', 'full_name', 'phone'] : ['id', 'title', 'name', 'category', 'price'];
        keys = keys.filter(k => items[0].hasOwnProperty(k));

        let html = '<table class="admin-table"><thead><tr>';
        keys.forEach(k => html += `<th>${k.toUpperCase()}</th>`);
        html += '<th>ДЕЙСТВИЯ</th></tr></thead><tbody>';

        items.forEach(item => {
            const rowClass = currentSection === 'applications' ? 'clickable-row' : '';
            const rowAction = currentSection === 'applications' ? `onclick="openAppDetails(${JSON.stringify(item).replace(/"/g, '&quot;')})"` : '';
            
            html += `<tr class="${rowClass}" ${rowAction}>`;
            keys.forEach(k => { html += `<td>${item[k] || '-'}</td>`; });
            
            html += `<td onclick="event.stopPropagation()">`;
            
            if (currentSection === 'applications') {
                const statusMap = { 'pending': 'Новая заявка', 'processing': 'На рассмотрении' };
                const statusLabel = statusMap[item.status] || item.status;
                html += `<button class="btn btn-status" onclick="cycleStatus(${item.id}, '${item.status}')">${statusLabel}</button> `;
                html += `<button class="btn btn-close-del" onclick="deleteItem(${item.id})">×</button>`;
            } else {
                html += `<button class="btn btn-edit" onclick='openEditModal(${JSON.stringify(item)})'>Edit</button> `;
                html += `<button class="btn btn-delete" onclick="deleteItem(${item.id})">Del</button>`;
            }
            html += `</td></tr>`;
        });
        area.innerHTML = html + '</tbody></table>';
    }

    function openAppDetails(item) {
        const content = document.getElementById('app-details-content');
        
        const tariffObj = globalTariffs.find(t => t.id == item.tariff);
        const entObj = globalEntertainment.find(e => e.id == item.entertainment);

        const fields = [
            {l: 'ID', v: item.id},
            {l: 'ФИО', v: item.full_name},
            {l: 'Телефон', v: item.phone},
            {l: 'Дата события', v: item.event_date},
            {l: 'Кол-во гостей', v: item.guests_count || 'Не указано'},
            {l: 'Тариф', v: tariffObj ? tariffObj.name : 'Не выбран'},
            {l: 'Шоу/Программа', v: entObj ? entObj.title : 'Не выбрано'},
            {l: 'Комментарий', v: item.message || 'Нет'}
        ];
        
        content.innerHTML = fields.map(f => `<div class="detail-item"><label>${f.l}</label><span>${f.v}</span></div>`).join('');

        document.getElementById('btn-app-approve').onclick = () => updateAppStatus(item.id, 'approved');
        document.getElementById('btn-app-edit').onclick = () => { closeDetailsModal(); openEditModal(item); };
        document.getElementById('btn-app-reply').onclick = () => updateAppStatus(item.id, 'processing');
        
        document.getElementById('app-details-overlay').style.display = 'flex';
    }

    async function cycleStatus(id, currentStatus) {
        const nextStatus = currentStatus === 'pending' ? 'processing' : 'pending';
        await updateAppStatus(id, nextStatus);
    }

    async function updateAppStatus(id, status) {
        const resp = await fetch(`/api/applications/${id}/`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ status })
        });
        if (resp.ok) {
            closeDetailsModal();
            loadSection('applications');
        }
    }

    function closeDetailsModal() { document.getElementById('app-details-overlay').style.display = 'none'; }

    function renderHomeView(data) {
        const items = Array.isArray(data) ? data : (data.results ? data.results : []);
        const area = document.getElementById('content-area');
        if (items.length === 0) {
            area.innerHTML = `<div style="text-align:center;"><button class="btn btn-add" onclick="openCreateModal()">Создать настройки</button></div>`;
            return;
        }
        const item = items[0];
        area.innerHTML = `
            <div style="background: white; padding: 40px; border-radius: 20px; border: 2px solid var(--mint);">
                <h2>${item.welcome_text || 'Заголовок'}</h2>
                <p><b>Телефон:</b> ${item.phone || '-'}</p>
                <p><b>Адрес:</b> ${item.address || '-'}</p>
                <button class="btn btn-edit-alt" onclick='openEditModal(${JSON.stringify(item)})' style="padding: 15px 30px;">Редактировать</button>
            </div>`;
    }

    function openCreateModal() {
        document.getElementById('modal-title').innerText = "Добавить запись";
        document.getElementById('field-id').value = '';
        renderFields();
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function openEditModal(item) {
        document.getElementById('modal-title').innerText = "Изменить запись";
        document.getElementById('field-id').value = item.id;
        renderFields(item);
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function renderFields(item = null) {
        const container = document.getElementById('form-fields');
        container.innerHTML = '';
        schema[currentSection].forEach(f => {
            let val = item ? (item[f.name] || '') : '';
            let html = `<div class="form-group"><label>${f.label}</label>`;
            
            if (f.type === 'select') {
                html += `<select name="${f.name}">${f.options.map(o => `<option value="${o.value}" ${val===o.value?'selected':''}>${o.label}</option>`).join('')}</select>`;
            } else if (f.type === 'select_dynamic') {
                const options = f.source === 'tariffs' ? globalTariffs : globalEntertainment;
                html += `<select name="${f.name}">
                    <option value="">Не выбрано</option>
                    ${options.map(opt => `<option value="${opt.id}" ${val == opt.id ? 'selected' : ''}>${opt.name || opt.title}</option>`).join('')}
                </select>`;
            } else if (f.type === 'textarea') {
                html += `<textarea name="${f.name}" rows="5">${val}</textarea>`;
            } else if (f.type === 'file') {
                html += `<input type="file" name="${f.name}">`;
            } else {
                html += `<input type="${f.type}" name="${f.name}" value="${val}">`;
            }
            container.innerHTML += html + '</div>';
        });
    }

    document.getElementById('admin-form').onsubmit = async function(e) {
        e.preventDefault();
        const id = document.getElementById('field-id').value;
        const formData = new FormData(this);
        const method = id ? 'PATCH' : 'POST';
        const url = id ? `/api/${currentSection}/${id}/` : `/api/${currentSection}/`;
        const resp = await fetch(url, { method, body: formData, headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
        if (resp.ok) { closeModal(); loadSection(currentSection); } else { 
            const err = await resp.json();
            alert('Ошибка: ' + JSON.stringify(err));
        }
    };

    async function deleteItem(id) {
        if (!confirm('Удалить?')) return;
        await fetch(`/api/${currentSection}/${id}/`, { method: 'DELETE', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
        loadSection(currentSection);
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    
    (async () => {
        await loadLookups();
        loadSection('events');
    })();
</script>
</body>
</html>
