{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <meta charset="UTF-8">
    <title>Панель управления | Новый Стиль</title>
    <style>
        :root {
            --mint: #a8e6cf;
            --dark: #1a1a1a;
            --gray: #f9f9f9;
            --pink: #ff8b94;
            --blue: #a2d2ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: var(--gray);
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 2px solid var(--mint);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            text-transform: uppercase;
            color: var(--dark);
            border-bottom: 2px solid var(--mint);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            background: none;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--mint);
            color: var(--dark);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-table {
            width: 100%;
            background: white;
            border-radius: 20px;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .admin-table th {
            background: var(--mint);
            padding: 15px;
            text-align: left;
            font-size: 14px;
        }

        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add { background: var(--mint); color: var(--dark); }
        .btn-edit { background: var(--blue); color: var(--dark); margin-right: 5px; }
        .btn-delete { background: var(--pink); color: white; }
        .btn-add:hover { transform: scale(1.05); }

        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(4px);
        }
        
        .modal-card {
            background: white; 
            width: 500px; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Админ-панель</h2>
    <button class="nav-btn active" onclick="loadSection('events')">🎭 Спектакли</button>
    <button class="nav-btn" onclick="loadSection('tariffs')">💰 Тарифы</button>
    <button class="nav-btn" onclick="loadSection('applications')">📩 Заявки</button>
    <button class="nav-btn" onclick="loadSection('home')">🏠 Главная и Контакты</button>
    <button class="nav-btn" onclick="loadSection('calendar')">📅 Календарь</button>
    <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <a href="{% url 'home' %}" style="text-decoration: none; color: #666; font-size: 14px; padding: 10px;">← На сайт</a>
</div>

<div class="main-content">
    <div class="header-actions">
        <h1 id="section-title">Спектакли</h1>
        <button class="btn btn-add" id="add-btn" onclick="openCreateModal()">+ Добавить запись</button>
    </div>

    <div id="content-area">
        <table class="admin-table">
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-card">
        <h2 id="modal-title" style="margin-top: 0; font-size: 20px;">Добавить запись</h2>
        <form id="admin-form" enctype="multipart/form-data">
            <input type="hidden" name="id" id="field-id">
            <div id="form-fields"></div>
            <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal()" style="background: #eee;">Отмена</button>
                <button type="submit" class="btn btn-add">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentSection = 'events';

    const schema = {
        'home': [
            { name: 'welcome_text', label: 'Заголовок приветствия', type: 'text' },
            { name: 'subtitle', label: 'Подзаголовок/Описание', type: 'textarea' },
            { name: 'banner_image', label: 'Главный баннер', type: 'file' },
            { name: 'phone', label: 'Телефон', type: 'text' },
            { name: 'email', label: 'Email для связи', type: 'text' },
            { name: 'address', label: 'Адрес театра', type: 'text' }
        ],
        'events': [
            { name: 'title', label: 'Название', type: 'text' },
            { name: 'image', label: 'Обложка (картинка)', type: 'file' },
            { name: 'short_description', label: 'Краткое описание', type: 'text' },
            { name: 'description', label: 'Полное описание', type: 'textarea' },
            { name: 'date', label: 'Дата', type: 'date' },
            { name: 'time', label: 'Время', type: 'time' },
            { name: 'location', label: 'Локация', type: 'text' },
            { name: 'price', label: 'Цена', type: 'number' },
            { name: 'is_active', label: 'Отображать на сайте', type: 'checkbox' }
        ],
        'tariffs': [
            { 
                name: 'category', 
                label: 'Категория', 
                type: 'select',
                options: [
                    { value: 'birthday', label: 'День рождения' },
                    { value: 'graduation', label: 'Выпускной' },
                    { value: 'spectacle', label: 'Спектакль' }
                ]
            },
            { name: 'name', label: 'Название тарифа', type: 'text' },
            { name: 'price', label: 'Цена', type: 'number' },
            { name: 'features_list', label: 'Список услуг', type: 'textarea' }
        ],
        'applications': [
            { name: 'full_name', label: 'Имя клиента', type: 'text' },
            { name: 'phone', label: 'Телефон', type: 'text' },
            { name: 'email', label: 'Email', type: 'text' },
            { name: 'age', label: 'Возраст детей', type: 'text' },
            { name: 'address', label: 'Адрес', type: 'text' },
            { name: 'event_date', label: 'Дата события', type: 'date' },
            { name: 'event_time', label: 'Время события', type: 'time' }
        ]
    };

    async function loadSection(section) {
    currentSection = section;
    const contentArea = document.getElementById('content-area');
    const addBtn = document.getElementById('add-btn');
    const titleEl = document.getElementById('section-title');

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('onclick')?.includes(`'${section}'`)) {
            btn.classList.add('active');
        }
    });

    const titles = { 
        'events': 'Управление спектаклями', 
        'tariffs': 'Настройка тарифов', 
        'applications': 'Входящие заявки',
        'home': 'Главная страница и контакты',
        'calendar': 'Календарь мероприятий'
    };
    titleEl.innerText = titles[section] || 'Панель управления';
    
    if (addBtn) {
        addBtn.style.display = (['events', 'tariffs'].includes(section)) ? 'block' : 'none';
    }

    contentArea.innerHTML = '<p style="padding:20px;">Загрузка...</p>';

    if (section === 'calendar') {
        try {
            const response = await fetch('/calendar-page/');
            const html = await response.text();
            contentArea.innerHTML = html;

            const scripts = contentArea.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });

            setTimeout(() => {
                if (window.initFullCalendar) window.initFullCalendar();
            }, 50);

        } catch (e) {
            contentArea.innerHTML = 'Ошибка загрузки страницы календаря';
        }
        return;
    }

    contentArea.innerHTML = `
        <table class="admin-table">
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>`;

    try {
        const response = await fetch(`/api/${section}/`);
        const data = await response.json();
        section === 'home' ? renderHomeSection(data) : renderTable(data);
    } catch (e) {
        console.error(e);
        const body = document.getElementById('table-body');
        if (body) body.innerHTML = '<tr><td>Ошибка загрузки данных</td></tr>';
    }
}

    function renderTable(data) {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        head.innerHTML = ''; 
        body.innerHTML = '';

        if (!data || data.length === 0) {
            body.innerHTML = '<tr><td colspan="100%" style="text-align:center; padding:30px;">Данных пока нет</td></tr>';
            return;
        }

        const keys = currentSection === 'events' 
            ? ['id', 'title', 'date', 'price'] 
            : currentSection === 'tariffs' 
                ? ['id', 'name', 'price', 'category']
                : ['id', 'full_name', 'phone', 'event_date'];
        
        keys.forEach(key => head.innerHTML += `<th>${key.toUpperCase()}</th>`);
        head.innerHTML += `<th>ДЕЙСТВИЯ</th>`;

        data.forEach(item => {
            let row = `<tr>`;
            keys.forEach(key => row += `<td>${item[key] || '-'}</td>`);
            
            let actionButtons = `<button class="btn btn-edit" onclick='openEditModal(${JSON.stringify(item)})'>Редактировать</button>`;
            if (currentSection !== 'applications') {
                actionButtons += `<button class="btn btn-delete" onclick="deleteItem(${item.id})">Удалить</button>`;
            }
            
            row += `<td>${actionButtons}</td></tr>`;
            body.innerHTML += row;
        });
    }

    function renderHomeSection(data) {
        const body = document.getElementById('table-body');
        const head = document.getElementById('table-head');
        head.innerHTML = ''; 
        body.innerHTML = '';

        const item = (Array.isArray(data) && data.length > 0) ? data[0] : (data.id ? data : null);

        if (!item) {
            body.innerHTML = '<tr><td style="padding:40px; text-align:center;">Данных нет. Создайте их в /admin/</td></tr>';
            return;
        }

        body.innerHTML = `
            <tr>
                <td colspan="100%" style="padding: 40px; text-align: center;">
                    <div style="background: white; padding: 30px; border-radius: 20px; display: inline-block; border: 2px solid var(--mint);">
                        <h2 style="margin-top:0;">${item.welcome_text || 'Заголовок не задан'}</h2>
                        <p>📍 ${item.address || 'Адрес не заполнен'}</p>
                        <p>📞 ${item.phone || 'Телефон не заполнен'}</p>
                        <button class="btn btn-edit" onclick='openEditModal(${JSON.stringify(item)})' style="padding: 10px 30px; margin-top:10px;">
                            🔧 Редактировать контакты и текст
                        </button>
                    </div>
                </td>
            </tr>`;
    }

    function generateFormFields(item = null) {
        const container = document.getElementById('form-fields');
        container.innerHTML = '';
        
        schema[currentSection].forEach(field => {
            let val = item ? item[field.name] : '';
            let inputHtml;

            if (field.type === 'select') {
                inputHtml = `<select name="${field.name}">
                    ${field.options.map(opt => `<option value="${opt.value}" ${val === opt.value ? 'selected' : ''}>${opt.label}</option>`).join('')}
                </select>`;
            } else if (field.type === 'textarea') {
                inputHtml = `<textarea name="${field.name}" rows="3">${val || ''}</textarea>`;
            } else if (field.type === 'file') {
                inputHtml = `<input type="file" name="${field.name}" accept="image/*">`;
                if (val) inputHtml += `<small style="display:block; margin-top:5px; color:green;">Файл уже загружен</small>`;
            } else if (field.type === 'checkbox') {
                inputHtml = `<input type="checkbox" name="${field.name}" style="width: auto;" ${val ? 'checked' : ''}>`;
            } else {
                inputHtml = `<input type="${field.type}" name="${field.name}" value="${val || ''}">`;
            }

            container.insertAdjacentHTML('beforeend', `
                <div class="form-group">
                    <label>${field.label}</label>
                    ${inputHtml}
                </div>`);
        });
    }

    function openCreateModal() {
        document.getElementById('modal-title').innerText = "Добавить новую запись";
        document.getElementById('field-id').value = ''; 
        generateFormFields();
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function openEditModal(item) {
        document.getElementById('modal-title').innerText = "Редактировать запись";
        document.getElementById('field-id').value = item.id; 
        generateFormFields(item);
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('admin-form').reset();
    }

    document.getElementById('admin-form').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const id = document.getElementById('field-id').value;

        const dateVal = formData.get('date') || formData.get('event_date');
        const timeVal = formData.get('time') || formData.get('event_time');

        if (dateVal && timeVal) {
            const combinedDateTime = dateVal.includes('T') ? dateVal : `${dateVal}T${timeVal}`;
            if (currentSection === 'events') formData.set('date', combinedDateTime);
        }

        if (currentSection === 'events' && e.target.is_active) {
            formData.set('is_active', e.target.is_active.checked);
        }

        const url = id ? `/api/${currentSection}/${id}/` : `/api/${currentSection}/`;
        const method = id ? 'PUT' : 'POST';

        const response = await fetch(url, {
            method: method,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: formData
        });

        if (response.ok) {
            closeModal();
            loadSection(currentSection);
        } else {
            const errorData = await response.json();
            alert('Ошибка при сохранении: ' + JSON.stringify(errorData));
        }
    };

    async function deleteItem(id) {
        if (confirm('Удалить эту запись?')) {
            await fetch(`/api/${currentSection}/${id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            });
            loadSection(currentSection);
        }
    }

    loadSection('events');
</script>

</body>
</html>
