{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Театр Новый Стиль</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background-color: #f9f9f9; 
        }
        header {
            background-color: #a8e6cf; 
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }
        .logo { 
            font-size: 20px; 
            font-weight: bold; 
            margin-right: 40px; 
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin-right: 20px;
            font-size: 15px;
        }
        nav a:hover { 
            color: #000; 
            text-decoration: underline; 
        }
        .afisha-container {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 60px 20px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .page-title {
            font-size: 42px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .page-subtitle {
            font-size: 18px;
            color: #666;
        }
        .events-grid {
            display: flex;
            flex-direction: column;
            gap: 35px; 
        }
        .event-card {
            display: flex; 
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
            overflow: hidden; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .event-card:hover {
            transform: translateY(-5px); 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12); 
        }
        .event-image {
            width: 35%; 
            min-height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .event-price {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            color: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .event-info {
            width: 65%;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .event-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #2ec4b6; 
        }
        .event-title {
            font-size: 28px;
            color: #111;
            margin: 10px 0 15px 0;
        }
        .event-description {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn-buy {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #a8e6cf 0%, #8cedc7 100%);
            color: #1a1a1a;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 230, 207, 0.4);
            text-align: center;
        }
        .btn-buy:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(168, 230, 207, 0.6);
        }
        .btn-buy.disabled {
            background: #e0e0e0;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }
        @media (max-width: 768px) {
            .event-card {
                flex-direction: column; 
            }
            .event-image {
                width: 100%;
                height: 200px;
            }
            .event-info {
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Театр-праздник «Новый стиль»</div>
        <nav>
            <a href="{% url 'home' %}">Главная</a>
            <a href="{% url 'afisha' %}">Афиша</a>
            <a class="nav-link" href="{% url 'spectacles_page' %}">Спектакли</a>
            <a href="{% url 'birthdays' %}">День Рождения</a>
            <a href="#">Выпускной</a>
            <a href="{% url 'about' %}">Контакты</a>
        </nav>
    </header>
    
    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
